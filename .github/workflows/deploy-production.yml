name: "Deploy: production"

env:
  REGISTRY: ghcr.io

on:
  workflow_dispatch:
    inputs:
      component:
        description: Component to deploy
        type: choice
        options: [all, bot, performance]
        default: bot
  workflow_call:
    inputs:
      component:
        type: string
        default: bot
    secrets:
      SSH_HOST:
        required: true
      SSH_USER:
        required: true
      SSH_PRIVATE_KEY:
        required: true
      SSH_TARGET_PATH:
        required: true
      PAT:
        required: true

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml via scp
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          overwrite: true
          target: ${{ secrets.SSH_TARGET_PATH }}

      - name: Pull and restart via ssh
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.SSH_TARGET_PATH }}
            echo ${{ secrets.PAT }} | docker login ${{ env.REGISTRY }} -u ${{ github.repository_owner }} --password-stdin
            case "${{ inputs.component }}" in
              bot)
                docker compose pull osubot
                docker compose up -d --no-deps osubot
                ;;
              performance)
                docker compose pull performance-server
                docker compose up -d --no-deps performance-server
                ;;
              all)
                docker compose pull
                docker compose up -d --remove-orphans
                ;;
              *)
                echo "Unknown component: ${{ inputs.component }}" >&2
                exit 1
                ;;
            esac
            docker logout ${{ env.REGISTRY }}
