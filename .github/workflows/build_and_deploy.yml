name: Release: build & deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    uses: ./.github/workflows/docker-build.yml

  deploy:
    needs: build
    uses: ./.github/workflows/deploy-production.yml
    secrets: inherit
