name: "Lint"

on:
    push:
        branches: [master]
        paths:
            - "bot/**"
            - ".github/workflows/lint.yml"
    pull_request:
        branches: [master]
        paths:
            - "bot/**"
            - ".github/workflows/lint.yml"

permissions:
    contents: read

concurrency:
    group: lint-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: bot
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install node
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm
                  cache-dependency-path: bot/package-lock.json

            - name: Install modules
              run: npm ci

            - name: Run ESLint
              run: npm run lint
